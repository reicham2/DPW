services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: activities
      POSTGRES_USER: activities_user
      POSTGRES_PASSWORD: activities_pass
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U activities_user -d activities" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BACKEND_BUILD_TYPE: "${BACKEND_BUILD_TYPE:-Release}"
        ENABLE_DEBUG_AUTH: "${ENABLE_DEBUG_AUTH:-0}"
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: activities
      POSTGRES_USER: activities_user
      POSTGRES_PASSWORD: activities_pass
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      DEBUG_ADMIN_EMAIL: "${DEBUG_ADMIN_EMAIL}"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      GITHUB_REPO: "${GITHUB_REPO:-reicham2/DPW}"
      MIDATA_API_KEY: "${MIDATA_API_KEY}"
      MIDATA_API_URL_TEMPLATE: "${MIDATA_API_URL_TEMPLATE:-https://db.scout.ch/de/gro\
        ups/{group_id}/people.json}"
      MIDATA_API_TIMEOUT_MS: "${MIDATA_API_TIMEOUT_MS:-8000}"
      DPW_VAPID_PUBLIC_KEY: "${DPW_VAPID_PUBLIC_KEY:-BF0k-8KktG7avuiHRIDoLWiA2yBWaWHe\
        V50YzOWNnWxzOn97WA0HgFD3wio8LDlVWAsYDHiNMiAh1KX_4V0Xpfc}"
      DPW_VAPID_PRIVATE_KEY: "${DPW_VAPID_PRIVATE_KEY:-kO0LywlbpLSJjAIitUZxO4z3-TIZZbQ5dOe-_HUAbxI}"
      DPW_VAPID_SUBJECT: "${DPW_VAPID_SUBJECT:-mailto:dev@localhost}"
      DPW_PUBLIC_URL: "${DPW_PUBLIC_URL:-http://localhost:8000}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DPW_CACHE_TTL_SECONDS: "${DPW_CACHE_TTL_SECONDS:-30}"
      REDIS_TIMEOUT_MS: "${REDIS_TIMEOUT_MS:-250}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:8080/health || exit 1" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        ENABLE_DEBUG_AUTH: "${FRONTEND_ENABLE_DEBUG_AUTH:-0}"
    restart: unless-stopped
    environment:
      MSAL_CLIENT_ID: "${VITE_MSAL_CLIENT_ID}"
      MSAL_TENANT_ID: "${VITE_MSAL_TENANT_ID}"
      AUTOSAVE_INTERVAL: "${VITE_AUTOSAVE_INTERVAL:-1500}"
      AUTOSAVE_DEBOUNCE: "${VITE_AUTOSAVE_DEBOUNCE:-true}"
      MIDATA_WEATHER_REFRESH_INTERVAL: "${VITE_MIDATA_WEATHER_REFRESH_INTERVAL:-900000}"
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
