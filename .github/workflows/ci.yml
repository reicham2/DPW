name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test_frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run --reporter=verbose

  test_backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f backend/Dockerfile.test backend/ -t dpw-test-backend

      - name: Run unit tests
        run: docker run --rm dpw-test-backend

  metadata:
    name: Docker Metadata
    runs-on: ubuntu-latest
    outputs:
      backend_tags: ${{ steps.backend_meta.outputs.tags }}
      backend_labels: ${{ steps.backend_meta.outputs.labels }}
      frontend_tags: ${{ steps.frontend_meta.outputs.tags }}
      frontend_labels: ${{ steps.frontend_meta.outputs.labels }}
    steps:
      - name: Docker metadata (backend)
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dpw-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (frontend)
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dpw-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

  build_backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [ metadata, test_backend ]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          build-args: |
            BACKEND_BUILD_TYPE=Release
            ENABLE_DEBUG_AUTH=0
          push: ${{ github.event_name == 'push' }}
          tags: ${{ needs.metadata.outputs.backend_tags }}
          labels: ${{ needs.metadata.outputs.backend_labels }}
          cache-from: type=gha,scope=dpw-backend
          cache-to: type=gha,mode=max,scope=dpw-backend

  build_frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [ metadata, test_frontend ]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            ENABLE_DEBUG_AUTH=0
          push: ${{ github.event_name == 'push' }}
          tags: ${{ needs.metadata.outputs.frontend_tags }}
          labels: ${{ needs.metadata.outputs.frontend_labels }}
          cache-from: type=gha,scope=dpw-frontend
          cache-to: type=gha,mode=max,scope=dpw-frontend

  smoke_test:
    name: Smoke Test (Docker Compose)
    runs-on: ubuntu-latest
    needs: [ build_backend, build_frontend ]
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Inject test VAPID values
        run: |
          cat >> .env <<'EOF'
          DPW_VAPID_PUBLIC_KEY=BF0k-8KktG7avuiHRIDoLWiA2yBWaWHeV50YzOWNnWxzOn97WA0HgFD3wio8LDlVWAsYDHiNMiAh1KX_4V0Xpfc
          DPW_VAPID_PRIVATE_KEY=kO0LywlbpLSJjAIitUZxO4z3-TIZZbQ5dOe-_HUAbxI
          DPW_VAPID_SUBJECT=mailto:ci@example.com
          EOF

      - name: Build all containers
        run: >
          BACKEND_BUILD_TYPE=Release ENABLE_DEBUG_AUTH=0
          FRONTEND_ENABLE_DEBUG_AUTH=0 docker compose -f docker-compose-dev.yml
          build

      - name: Start services
        run: docker compose -f docker-compose-dev.yml up -d

      - name: Wait for backend health
        run: |
          echo "Waiting for backend health..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose-dev.yml exec -T backend curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Attempt $i/30"
            sleep 2
          done
          echo "Backend did not become healthy"
          docker compose -f docker-compose-dev.yml logs backend
          exit 1

      - name: Verify push VAPID endpoint
        run: |
          curl -sf http://localhost:8000/api/push/vapid-public-key > /dev/null
          echo "Push VAPID endpoint reachable"

      - name: Wait for frontend health
        run: |
          echo "Waiting for frontend health..."
          for i in $(seq 1 15); do
            if docker compose -f docker-compose-dev.yml exec -T frontend curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "Frontend healthy"
              exit 0
            fi
            echo "Attempt $i/15"
            sleep 2
          done
          echo "Frontend did not become healthy"
          docker compose -f docker-compose-dev.yml logs frontend
          exit 1

      - name: Verify DB schema loaded
        run: |
          docker compose -f docker-compose-dev.yml exec -T db psql -U activities_user -d activities \
            -c "\\dt" | grep -q activities
          echo "DB schema present"

      - name: Print container status
        if: always()
        run: docker compose -f docker-compose-dev.yml ps

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose-dev.yml logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose-dev.yml down -v
