name: CI - Docker Build, Test and Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      backend_tags: ${{ steps.backend_meta.outputs.tags }}
      backend_labels: ${{ steps.backend_meta.outputs.labels }}
      frontend_tags: ${{ steps.frontend_meta.outputs.tags }}
      frontend_labels: ${{ steps.frontend_meta.outputs.labels }}
    steps:
      - name: Docker metadata (backend)
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dpw-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (frontend)
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/dpw-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

  build_backend:
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          build-args: |
            BACKEND_BUILD_TYPE=Release
          push: ${{ github.event_name == 'push' }}
          tags: ${{ needs.metadata.outputs.backend_tags }}
          labels: ${{ needs.metadata.outputs.backend_labels }}
          cache-from: type=gha,scope=dpw-backend
          cache-to: type=gha,mode=max,scope=dpw-backend

  build_frontend:
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ needs.metadata.outputs.frontend_tags }}
          labels: ${{ needs.metadata.outputs.frontend_labels }}
          cache-from: type=gha,scope=dpw-frontend
          cache-to: type=gha,mode=max,scope=dpw-frontend

  smoke_test:
    runs-on: ubuntu-latest
    needs: [build_backend, build_frontend]
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build all containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          echo "Waiting for backend health..."
          for i in $(seq 1 30); do
            if docker compose exec -T backend curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend healthy"
              exit 0
            fi
            echo "Attempt $i/30"
            sleep 2
          done
          echo "Backend did not become healthy"
          docker compose logs backend
          exit 1

      - name: Wait for frontend health
        run: |
          echo "Waiting for frontend health..."
          for i in $(seq 1 15); do
            if docker compose exec -T frontend curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "Frontend healthy"
              exit 0
            fi
            echo "Attempt $i/15"
            sleep 2
          done
          echo "Frontend did not become healthy"
          docker compose logs frontend
          exit 1

      - name: Verify DB schema loaded
        run: |
          docker compose exec -T db psql -U activities_user -d activities \
            -c "\\dt" | grep -q activities
          echo "DB schema present"

      - name: Print container status
        if: always()
        run: docker compose ps

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose down -v
