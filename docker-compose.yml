# ── DPW – Produktiv-Setup mit fertigen GitHub-Container-Images ───────────────
#
# 1. Erstelle eine .env Datei (siehe .env.example) und trage die Werte ein.
# 2. Starten:  docker compose up -d
#
# Die Images werden automatisch von ghcr.io gezogen.
# Zum Pinnen auf eine Version: image: ghcr.io/reicham2/dpw-backend:v1.0.0
#
# Für Entwicklung:  make rebuild  (verwendet docker-compose-dev.yml)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: activities
      POSTGRES_USER: activities_user
      POSTGRES_PASSWORD: activities_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U activities_user -d activities" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s

  backend:
    image: ghcr.io/reicham2/dpw-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: activities
      POSTGRES_USER: activities_user
      POSTGRES_PASSWORD: activities_pass
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DPW_CACHE_TTL_SECONDS: "30"
      REDIS_TIMEOUT_MS: "250"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://127.0.0.1:8080/health || exit 1" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s

  frontend:
    image: ghcr.io/reicham2/dpw-frontend:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
