services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: activities
      POSTGRES_USER: activities_user
      POSTGRES_PASSWORD: activities_pass
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activities_user -d activities"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: activities
      POSTGRES_USER: activities_user
      POSTGRES_PASSWORD: activities_pass
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      DEBUG: "${DEBUG}"
      DEBUG_ADMIN_EMAIL: "${DEBUG_ADMIN_EMAIL}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      # Ganzes Projekt-Root als Build-Context, damit .env erreichbar ist
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_MSAL_CLIENT_ID: "${VITE_MSAL_CLIENT_ID}"
        VITE_MSAL_TENANT_ID: "${VITE_MSAL_TENANT_ID}"
        VITE_DEBUG: "${VITE_DEBUG}"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
