# ── DPW – Produktiv-Setup mit fertigen GitHub-Container-Images ───────────────
#
# 1. Erstelle eine .env Datei (siehe .env.example) und trage die Werte ein.
# 2. Starten:  docker compose up -d
#
# Die Images werden automatisch von ghcr.io gezogen.
# Zum Pinnen auf eine Version: image: ghcr.io/reicham2/dpw-backend:v1.0.0
#
# Für Entwicklung:  make rebuild  (verwendet docker-compose-dev.yml)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: activities
      POSTGRES_USER: activities_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Setze POSTGRES_PASSWORD in .env}"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U activities_user -d activities" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s

  backend:
    image: ghcr.io/reicham2/dpw-backend:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: activities
      POSTGRES_USER: activities_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Setze POSTGRES_PASSWORD in .env}"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID:?Setze AZURE_TENANT_ID in .env}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID:?Setze AZURE_CLIENT_ID in .env}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET:?Setze AZURE_CLIENT_SECRET in .env}"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      GITHUB_REPO: "${GITHUB_REPO:-reicham2/DPW}"
      MIDATA_API_KEY: "${MIDATA_API_KEY}"
      MIDATA_API_KEY_HEADER: "${MIDATA_API_KEY_HEADER:-X-API-Key}"
      MIDATA_API_URL_TEMPLATE: "${MIDATA_API_URL_TEMPLATE:-https://db.scout.ch/de/gro\
        ups/{group_id}/people.json}"
      MIDATA_API_TIMEOUT_MS: "${MIDATA_API_TIMEOUT_MS:-8000}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1" ]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s

  frontend:
    image: ghcr.io/reicham2/dpw-frontend:latest
    restart: unless-stopped
    environment:
      MSAL_CLIENT_ID: "${VITE_MSAL_CLIENT_ID:?Setze VITE_MSAL_CLIENT_ID in .env}"
      MSAL_TENANT_ID: "${VITE_MSAL_TENANT_ID:?Setze VITE_MSAL_TENANT_ID in .env}"
      AUTOSAVE_INTERVAL: "${VITE_AUTOSAVE_INTERVAL:-1500}"
      AUTOSAVE_DEBOUNCE: "${VITE_AUTOSAVE_DEBOUNCE:-true}"
      MIDATA_WEATHER_REFRESH_INTERVAL: "${VITE_MIDATA_WEATHER_REFRESH_INTERVAL:-900000}"
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
